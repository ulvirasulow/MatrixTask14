services:
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: matrix
      MINIO_ROOT_PASSWORD: matrix123
      MINIO_SERVER_URL: http://localhost:9000
      MINIO_BROWSER_REDIRECT_URL: http://localhost:9001
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - lake

  postgres:
    image: postgres:15-alpine
    container_name: postgres 
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_PASSWORD: your_strong_password
      POSTGRES_USER: postgres 
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/pg_files:/files 
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lake

  spark-master:
    build: .
    container_name: spark-master
    environment:
      - SPARK_NO_DAEMONIZE=true
      - PYSPARK_PYTHON=/opt/conda/envs/py311/bin/python
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:
      - ./spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - spark_events:/spark-events
    networks:
      - lake

  spark-worker-1:
    build: .
    container_name: spark-worker-1
    depends_on:
      - spark-master
    environment:
      - SPARK_NO_DAEMONIZE=true
      - PYSPARK_PYTHON=/opt/conda/envs/py311/bin/python
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    ports:
      - "8081:8081"
    volumes:
      - ./spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - spark_events:/spark-events
    networks:
      - lake

  jupyter:
    image: quay.io/jupyter/pyspark-notebook:x86_64-spark-3.5.2
    container_name: jupyter
    depends_on:
      - spark-master
      - minio
      - postgres
    ports:
      - "8888:8888"
      - "4040:4040"
    volumes:
      - ./notebooks:/home/jovyan/work
      - spark_events:/spark-events
    environment:
      - SPARK_MASTER=spark://spark-master:7077
      - PYSPARK_SUBMIT_ARGS=--master spark://spark-master:7077 --packages io.delta:delta-spark_2.12:3.2.0,org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262,org.postgresql:postgresql:42.7.2 pyspark-shell
      - CHOWN_EXTRA=/spark-events
      - CHOWN_EXTRA_OPTS=-R
    networks:
      - lake

networks:
  lake:

volumes:
  minio_data:
  spark_events:
  postgres_data: